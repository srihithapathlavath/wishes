<!DOCTYPE html>
<html>
<head>
  <title>Birthday Wishes</title>
  
<style>
  body {
    text-align: center;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee, #b5fffc, #d4fc79, #96e6a1);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    min-height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  @keyframes gradientShift {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }

  h1 {
    color: #4b0082;
    font-size: 3em;
    text-shadow: 2px 2px 10px #fff, 0 0 20px #00f, 0 0 30px #0ff;
  }

  .wish {
    font-size: 1.5em;
    margin-top: 20px;
    color: #222;
    background: rgba(255, 255, 255, 0.85);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(0, 255, 255, 0.8), 0 0 35px rgba(255, 255, 0, 0.6);
    max-width: 700px;
    line-height: 1.6;
    animation: glowPulse 3s infinite;
  }

  @keyframes glowPulse {
    0% { box-shadow: 0 0 15px #ff0; }
    50% { box-shadow: 0 0 25px #0ff; }
    100% { box-shadow: 0 0 15px #ff0; }
  }

  button {
    padding: 12px 25px;
    margin-top: 20px;
    font-size: 1em;
    border: none;
    border-radius: 25px;
    background: linear-gradient(45deg, #00c6ff, #0072ff, #7f00ff, #e100ff);
    color: white;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px #fff, 0 0 25px #00f;
  }

  button:hover {
    transform: scale(1.1) rotate(2deg);
    box-shadow: 0 0 25px #ff0, 0 0 35px #0ff;
  }

  .heart {
    font-size: 2em;
    animation: float 3s infinite;
    margin: 5px;
    background: linear-gradient(45deg, #ff0, #0ff, #00f, #7f00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  @keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0); }
  }

  .decor {
    display: flex;
    justify-content: center;
    margin-top: 20px;
  }

  #loveMsg {
    font-size: 1.5em;
    margin-top: 25px;
    color: #0072ff;
    display: none;
    text-shadow: 0 0 10px #0ff, 0 0 20px #ff0;
    animation: fadeIn 2s ease forwards;
  }

  @keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
  }
</style>

</head>
<body>
  <h1>🎂 Happy Birthday MR.KIRAN🎉</h1>
  <div class="wish" id="wishText">Click the button for a surprise!</div>
  <button id="wishBtn" onclick="generateWish()">💖 Get Wish 💖</button>
  <button id="loveBtn" onclick="showLove()" style="display:none;">💞 Lots of Love 💞</button>
  <button id="againBtn" onclick="resetWishes()" style="display:none;">🔄 Again Wishes 🔄</button>

  <div class="decor">
    <span class="heart">❤️</span>
    <span class="heart">💖</span>
    <span class="heart">💕</span>
    <span class="heart">💞</span>
    <span class="heart">💓</span>
  </div>

  <div id="loveMsg">🤗🤗🤗 Sending you lots of love and warm hugs! 💕💖💓</div>

  <script>
    const wishes = [
      "❤️ Wishing you endless love and joy today! ❤️",
      "💕 Cheers to another year of happiness 💕",
      "💞 Have a magical birthday full of love 💞",
      "💓 May your day be as sweet as your heart 💓",
      `🎂 Happy Happy Happy Birthday MR.KIRAN! I hope you have a really nice day and a year full of happiness. 
      I’m grateful for the memories we shared and the good moments we had. 
      I hope this year brings you success, smiles, and everything you deserve. 
      Take care and stay happy always. 🎂`
    ];

    let index = 0;

    function generateWish() {
      document.getElementById("wishText").innerText = wishes[index];
      index++;

      if (index >= wishes.length) {
        // After all wishes shown, switch to Lots of Love button
        document.getElementById("wishBtn").style.display = "none";
        document.getElementById("loveBtn").style.display = "inline-block";
      }
    }

    function showLove() {
      document.getElementById("loveMsg").style.display = "block";
      document.getElementById("loveBtn").style.display = "none";
      document.getElementById("againBtn").style.display = "inline-block";
    }

    function resetWishes() {
      index = 0;
      document.getElementById("wishText").innerText = "Click the button for a surprise!";
      document.getElementById("loveMsg").style.display = "none";
      document.getElementById("againBtn").style.display = "none";
      document.getElementById("wishBtn").style.display = "inline-block";
    }
  </script>
</body>
</html>
